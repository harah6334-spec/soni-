<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You are Offline | Soni ETC</title>
  <style>
    :root {
      --primary: #1e3a5f;
      --accent: #f97316;
      --dark-bg: #0C0824;
      --card-bg: #130f35;
      --text-white: #ffffff;
      --text-slate: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--dark-bg);
      color: var(--text-white);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    .offline-card {
      background-color: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
    }

    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 24px;
      color: var(--text-white);
      margin-right: 12px;
    }

    .logo-text {
      text-align: left;
    }

    .logo-title {
      font-weight: 900;
      font-size: 16px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .logo-title span {
      color: #a855f7;
    }

    .logo-subtitle {
      font-weight: bold;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-slate);
    }

    .offline-icon {
      font-size: 64px;
      margin-bottom: 20px;
      color: var(--accent);
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.08); opacity: 1; }
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--text-slate);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #ea580c);
      color: var(--text-white);
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #ef4444;
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="logo-container">
      <div class="logo-icon">💻</div>
      <div class="logo-text">
        <div class="logo-title">SONI <span>EDUCATION</span></div>
        <div class="logo-subtitle">& TRAINING CENTER</div>
      </div>
    </div>

    <div class="status-pill">
      <span class="status-dot"></span>
      You Are Offline - Soni ETC
    </div>

    <div class="offline-icon">🔌</div>
    <h1>No Internet Connection</h1>
    <p>Please check your cellular data or Wi-Fi settings to connect back to the institute servers. You can retry anytime to resume your digital computer classes.</p>

    <button class="btn" onclick="window.location.reload(true)">Try Reconnecting</button>
  </div>
</body>
</html>
